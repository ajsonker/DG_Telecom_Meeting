<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meeting Countdown</title>

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    background-image: url("bg_1.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
}

.container {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.4);
    color: white;
    text-align: center;
}

#meetLink {
    display: none;
    margin-top: 20px;
    padding: 12px 25px;
    background: #00ff99;
    color: black;
    text-decoration: none;
    font-size: 18px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Meeting Countdown</h1>
    <h2 id="countdown">Loading...</h2>

    <a id="meetLink"
       href="https://teams.microsoft.com/meet/28681257958731?p=ln54NuWAv021EGldF8"
       target="_blank">
        Join Meet
    </a>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // 👉 YAHAN TIME SET KARO
    // (Year, Month-1, Date, Hour, Minute, Second)
    const meetingTime = new Date(2026, 0, 19, 15, 45, 0).getTime();

    const countdownEl = document.getElementById("countdown");
    const meetLinkEl = document.getElementById("meetLink");

    const timer = setInterval(() => {
        const now = new Date().getTime();
        const diff = meetingTime - now;

        if (diff <= 0) {
            clearInterval(timer);
            countdownEl.innerHTML = "Meeting Started";
            meetLinkEl.style.display = "inline-block";
            return;
        }

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        countdownEl.innerHTML = `${hours}h ${minutes}m ${seconds}s`;
    }, 1000);

});
</script>

</body>
</html>
